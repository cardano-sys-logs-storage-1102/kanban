    <div class="modal-panel" id="panel-note">
      <div id="note-panel">
        <div class="note-toolbar">
          <button class="note-tb-btn active" id="note-edit-btn">✏️ Editar</button>
          <button class="note-tb-btn" id="note-preview-btn">👁 Preview</button>
          <span style="flex:1"></span>
          <span class="note-hint">Markdown suportado · [[WikiLinks]]</span>
        </div>
        <textarea id="note-editor" placeholder="# Nota do card&#10;&#10;Escreva aqui usando **Markdown**...&#10;&#10;- [ ] Tarefa pendente&#10;- [x] Tarefa concluída&#10;&#10;> Citação importante&#10;&#10;[[Link para outra nota]]"></textarea>
        <div id="note-preview"></div>
      </div>
    </div>
  </div>
</div>

<div id="emoji-picker">
  <div class="emoji-cats" id="emoji-cats"></div>
  <div class="emoji-grid" id="emoji-grid"></div>
</div>

<div id="col-color-picker">
  <label>Cor da coluna</label>
  <div class="palette-grid" id="col-palette-grid"></div>
</div>

<div id="ctx-menu">
  <div class="ctx-item" id="ctx-rename">✏️ Renomear coluna</div>
  <div class="ctx-item" id="ctx-color">🎨 Cor da coluna</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item danger" id="ctx-delete">🗑 Excluir coluna</div>
</div>

<div id="toast"></div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <h3 id="confirm-title">Confirmar</h3>
    <p id="confirm-msg">Tem certeza?</p>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirm-cancel">Cancelar</button>
      <button class="confirm-ok" id="confirm-ok">Confirmar</button>
    </div>
  </div>
</div>

<script>
/* ============================================================
   CONSTANTS
   ============================================================ */
const CARD_COLORS = [
  null,
  '#f87171','#fb923c','#facc15','#86efac',
  '#67e8f9','#93c5fd','#c084fc','#f9a8d4',
  '#fde68a','#a7f3d0','#bfdbfe','#e9d5ff'
];
const COL_COLORS = [
  '#f59e0b','#3b82f6','#22c55e','#ef4444',
  '#8b5cf6','#ec4899','#14b8a6','#f97316',
  '#64748b','#06b6d4','#84cc16','#e11d48'
];
const TAG_COLORS = [
  {bg:'#dbeafe',fg:'#1d4ed8'},{bg:'#dcfce7',fg:'#15803d'},
  {bg:'#fef9c3',fg:'#854d0e'},{bg:'#fce7f3',fg:'#9d174d'},
  {bg:'#ede9fe',fg:'#5b21b6'},{bg:'#fee2e2',fg:'#991b1b'},
  {bg:'#e0f2fe',fg:'#0369a1'},{bg:'#f3f4f6',fg:'#374151'},
];
const EMOJIS = {
  'Rostos':['😀','😂','😊','😍','🤔','😎','😢','😡','🥳','😴','🤯','😱','🥺','😇','🤩','🤗'],
  'Objetos':['📌','📎','📋','📊','📈','💡','🔔','⚙️','🔧','📦','🗂️','📁','💼','🖥️','📱','⌚'],
  'Status':['✅','❌','⚠️','🔴','🟡','🟢','⏳','🚀','🔒','🔓','💯','🎯','🏆','⭐','🔥','💎'],
  'Bandeiras':['🚩','🏁','🎌','🏳️','🏴','🏴‍☠️','🇧🇷','🇺🇸','🇬🇧','🇩🇪','🇫🇷','🇯🇵','🇨🇳','🇷🇺','🇮🇳','🇰🇷'],
};

/* ============================================================
   STATE
   ============================================================ */
function uid() { return Math.random().toString(36).slice(2,10); }

function defaultProject(name) {
  return {
    id: uid(), name: name || 'Projeto',
    columns: [
      { id: uid(), name: 'A Fazer',     color: '#f59e0b', cards: [] },
      { id: uid(), name: 'Em Progresso', color: '#3b82f6', cards: [] },
      { id: uid(), name: 'Concluído',    color: '#22c55e', cards: [] },
    ]
  };
}

function defaultCard(title) {
  return { id: uid(), title: title || 'Novo card', emoji: '📌',
    description: '', note: '', color: null, priority: 'none',
    dueDate: '', tags: [], checklist: [] };
}

let state = { projects: [], activeProjectId: null };
let undoStack = [];
let dragInfo = { cardId: null, fromColId: null };
let currentModalCardId = null;
let currentModalColId  = null;
let emojiPickerTarget  = null;
let ctxColId           = null;
let colColorTargetId   = null;
let searchQuery        = '';
let notePreviewMode    = false;

/* ============================================================
   PERSISTENCE — single localStorage key, all projects
   ============================================================ */
function saveState() {
  localStorage.setItem('kanban_pro_v2', JSON.stringify(state));
  const now = new Date();
  const hm = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  const si = document.getElementById('save-indicator');
  si.textContent = `✓ Salvo ${hm}`;
  si.classList.add('saved');
  clearTimeout(saveState._t);
  saveState._t = setTimeout(() => si.classList.remove('saved'), 3000);
}

function loadState() {
  const raw = localStorage.getItem('kanban_pro_v2');
  if (raw) { try { state = JSON.parse(raw); } catch(e) {} }
  if (!state.projects || state.projects.length === 0)
    state.projects = [defaultProject('Meu Projeto')];
  if (!state.activeProjectId || !state.projects.find(p => p.id === state.activeProjectId))
    state.activeProjectId = state.projects[0].id;
}

/* ============================================================
   GETTERS
   ============================================================ */
function activeProject() { return state.projects.find(p => p.id === state.activeProjectId); }
function getCol(colId) {
  for (const p of state.projects)
    for (const c of p.columns) if (c.id === colId) return c;
}
function getCard(cardId) {
  for (const p of state.projects)
    for (const c of p.columns) {
      const card = c.cards.find(x => x.id === cardId);
      if (card) return { card, col: c };
    }
  return null;
}

/* ============================================================
   THEME
   ============================================================ */
function initTheme() {
  const saved = localStorage.getItem('kanban_theme');
  const sys = window.matchMedia('(prefers-color-scheme: dark)').matches;
  setTheme(saved || (sys ? 'dark' : 'light'));
}
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('kanban_theme', t);
  document.getElementById('theme-icon-sun').style.display  = t === 'dark'  ? 'none' : '';
  document.getElementById('theme-icon-moon').style.display = t === 'light' ? 'none' : '';
}
document.getElementById('theme-btn').addEventListener('click', () => {
  setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

/* ============================================================
   PROJECT DROPDOWN
   ============================================================ */
function renderProjectDropdown() {
  const list = document.getElementById('project-list');
  list.innerHTML = '';
  state.projects.forEach(p => {
    const item = document.createElement('div');
    item.className = 'proj-item' + (p.id === state.activeProjectId ? ' active' : '');
    const firstColColor = p.columns[0]?.color || '#888';
    item.innerHTML = `
      <div class="proj-item-dot" style="background:${firstColColor}"></div>
      <span class="proj-item-name">${p.name}</span>
      <button class="proj-item-del" title="Excluir projeto">✕</button>
    `;
    item.querySelector('.proj-item-del').addEventListener('click', e => {
      e.stopPropagation();
      if (state.projects.length === 1) { toast('Não é possível excluir o único projeto.'); return; }
      confirm2(`Excluir "${p.name}"?`, 'Todos os dados deste projeto serão perdidos.', () => {
        state.projects = state.projects.filter(x => x.id !== p.id);
        if (state.activeProjectId === p.id) state.activeProjectId = state.projects[0].id;
        saveState(); renderProjectDropdown(); renderBoard();
      });
    });
    item.addEventListener('click', () => {
      state.activeProjectId = p.id;
      closeProjectDropdown();
      saveState(); renderProjectDropdown(); renderBoard();
    });
    list.appendChild(item);
  });
  // update trigger label
  const ap = activeProject();
  document.getElementById('project-trigger-name').textContent = ap ? ap.name : '—';
}

function openProjectDropdown() {
  document.getElementById('project-dropdown').classList.add('open');
  document.getElementById('project-trigger-arrow').classList.add('open');
}
function closeProjectDropdown() {
  document.getElementById('project-dropdown').classList.remove('open');
  document.getElementById('project-trigger-arrow').classList.remove('open');
}

document.getElementById('project-trigger').addEventListener('click', e => {
  e.stopPropagation();
  const dd = document.getElementById('project-dropdown');
  if (dd.classList.contains('open')) closeProjectDropdown();
  else { renderProjectDropdown(); openProjectDropdown(); }
});

document.getElementById('proj-new-btn').addEventListener('click', () => {
  const p = defaultProject('Projeto ' + (state.projects.length + 1));
  state.projects.push(p);
  state.activeProjectId = p.id;
  closeProjectDropdown();
  saveState(); renderProjectDropdown(); renderBoard();
});

/* ============================================================
   PROGRESS
   ============================================================ */
function renderProgress() {
  const p = activeProject();
  if (!p) return;
  let total = 0, done = 0;
  const lastColId = p.columns[p.columns.length - 1]?.id;
  p.columns.forEach(c => {
    total += c.cards.length;
    if (c.id === lastColId) done += c.cards.length;
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('active-project-label').textContent = p.name;
  document.getElementById('progress-text').textContent =
    total ? `${done}/${total} concluídos · ${pct}%` : 'Sem cards';
  document.getElementById('progress-fill').style.width = pct + '%';
}

/* ============================================================
   RENDER BOARD
   ============================================================ */
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const p = activeProject();
  if (!p) return;
  p.columns.forEach(col => board.appendChild(buildColumn(col)));
  const addBtn = document.createElement('button');
  addBtn.id = 'add-col-btn';
  addBtn.innerHTML = '＋ Nova coluna';
  addBtn.addEventListener('click', () => {
    const col = { id: uid(), name: 'Nova Coluna', color: '#6b7280', cards: [] };
    activeProject().columns.push(col);
    saveState(); renderBoard();
  });
  board.appendChild(addBtn);
  renderProgress();
  applySearch();
}

/* ============================================================
   BUILD COLUMN
   ============================================================ */
function buildColumn(col) {
  const el = document.createElement('div');
  el.className = 'column';
  el.dataset.colId = col.id;

  // Modificação de cor mais aparente na "Caixa" (Fundo e borda)
  if (col.color) {
    el.style.backgroundColor = `color-mix(in srgb, ${col.color} 6%, var(--bg2))`;
    el.style.borderColor = `color-mix(in srgb, ${col.color} 25%, var(--border2))`;
  }

  // color strip at top
  const strip = document.createElement('div');
  strip.className = 'col-color-strip';
  strip.style.background = col.color || '#6b7280';
  el.appendChild(strip);

  const header = document.createElement('div');
  header.className = 'col-header';

  const dot = document.createElement('div');
  dot.className = 'col-dot';
  dot.style.background = col.color || '#6b7280';
  dot.title = 'Mudar cor da coluna';
  dot.addEventListener('click', e => {
    e.stopPropagation();
    openColColorPicker(col.id, e.clientX, e.clientY);
  });
  header.appendChild(dot);

  const titleWrap = document.createElement('div');
  titleWrap.className = 'col-title-wrap';
  const titleEl = document.createElement('div');
  titleEl.className = 'col-title';
  titleEl.contentEditable = 'true';
  titleEl.textContent = col.name;
  titleEl.addEventListener('blur', () => { col.name = titleEl.textContent.trim() || col.name; saveState(); renderProgress(); });
  titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });
  const count = document.createElement('span');
  count.className = 'col-count';
  count.textContent = col.cards.length;
  titleWrap.appendChild(titleEl);
  titleWrap.appendChild(count);
  header.appendChild(titleWrap);

  const menuBtn = document.createElement('button');
  menuBtn.className = 'col-menu-btn';
  menuBtn.textContent = '⋯';
  menuBtn.addEventListener('click', e => { e.stopPropagation(); openCtxMenu(col.id, e.clientX, e.clientY); });
  header.appendChild(menuBtn);
  el.appendChild(header);

  const list = document.createElement('div');
  list.className = 'cards-list';
  list.dataset.colId = col.id;
  col.cards.forEach(card => list.appendChild(buildCard(card, col.id)));
  setupDropZone(list, col.id);
  el.appendChild(list);

  const addBtn = document.createElement('button');
  addBtn.className = 'add-card-btn';
  addBtn.innerHTML = '＋ Adicionar card';
  addBtn.addEventListener('click', () => addCard(col.id));
  el.appendChild(addBtn);

  return el;
}

/* ============================================================
   BUILD CARD
   ============================================================ */
function buildCard(card, colId) {
  const el = document.createElement('div');
  el.className = 'card';
  el.draggable = true;
  el.dataset.cardId = card.id;
  el.dataset.colId = colId;

  if (card.color) {
    const bar = document.createElement('div');
    bar.className = 'card-color-bar';
    bar.style.background = card.color;
    el.appendChild(bar);
    el.style.paddingTop = '13px';
  }

  const top = document.createElement('div');
  top.className = 'card-top';

  const emojiEl = document.createElement('span');
  emojiEl.className = 'card-emoji';
  emojiEl.textContent = card.emoji || '📌';
  emojiEl.addEventListener('click', e => { e.stopPropagation(); openEmojiPicker(card.id, e.clientX, e.clientY); });
  top.appendChild(emojiEl);

  const titleEl = document.createElement('div');
  titleEl.className = 'card-title';
  titleEl.contentEditable = 'true';
  titleEl.textContent = card.title;
  titleEl.addEventListener('mousedown', e => e.stopPropagation());
  titleEl.addEventListener('blur', () => { card.title = titleEl.textContent.trim() || card.title; saveState(); });
  titleEl.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); titleEl.blur(); } });
  top.appendChild(titleEl);

  const actions = document.createElement('div');
  actions.className = 'card-actions';

  const focusBtn = document.createElement('button');
  focusBtn.className = 'card-action-btn';
  focusBtn.title = 'Abrir detalhes';
  focusBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
  focusBtn.addEventListener('click', e => { e.stopPropagation(); openModal(card.id, colId); });
  actions.appendChild(focusBtn);

  const dupBtn = document.createElement('button');
  dupBtn.className = 'card-action-btn';
  dupBtn.title = 'Duplicar';
  dupBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
  dupBtn.addEventListener('click', e => {
    e.stopPropagation();
    const col = getCol(colId);
    const copy = JSON.parse(JSON.stringify(card)); copy.id = uid(); copy.title += ' (cópia)';
    col.cards.splice(col.cards.findIndex(c => c.id === card.id) + 1, 0, copy);
    saveState(); renderBoard(); toast('Card duplicado');
  });
  actions.appendChild(dupBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'card-action-btn del';
  delBtn.title = 'Excluir';
  delBtn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
  delBtn.addEventListener('click', e => {
    e.stopPropagation();
    confirm2('Excluir card?', `"${card.title}" será removido.`, () => deleteCard(card.id, colId));
  });
  actions.appendChild(delBtn);
  top.appendChild(actions);
  el.appendChild(top);

  // note indicator
  if (card.note && card.note.trim()) {
    const noteInd = document.createElement('div');
    noteInd.className = 'card-has-note';
    noteInd.innerHTML = `📝 <span>Tem nota</span>`;
    el.appendChild(noteInd);
  }

  // badges
  const badges = document.createElement('div');
  badges.className = 'card-badges';
  if (card.priority && card.priority !== 'none') {
    const pb = document.createElement('span');
    pb.className = 'badge-priority ' + card.priority;
    pb.textContent = card.priority === 'high' ? '🔴 Alta' : card.priority === 'medium' ? '🟡 Média' : '🟢 Baixa';
    badges.appendChild(pb);
  }
  (card.tags || []).forEach(tag => {
    const idx = tag.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % TAG_COLORS.length;
    const tc = TAG_COLORS[idx];
    const t = document.createElement('span');
    t.className = 'tag';
    t.textContent = '#' + tag;
    t.style.background = tc.bg; t.style.color = tc.fg;
    badges.appendChild(t);
  });
  if (badges.children.length) el.appendChild(badges);

  // due date
  if (card.dueDate) {
    const due = document.createElement('div');
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(card.dueDate + 'T00:00:00');
    const diff = Math.ceil((d - today) / 86400000);
    let cls = 'ok', icon = '📅';
    if (diff < 0) { cls = 'overdue'; icon = '⚠️'; }
    else if (diff <= 3) { cls = 'soon'; icon = '⏰'; }
    due.className = 'card-due ' + cls;
    due.innerHTML = `<span>${icon}</span><span>${d.toLocaleDateString('pt-BR')}</span>`;
    el.appendChild(due);
  }

  // checklist summary
  if (card.checklist && card.checklist.length > 0) {
    const done = card.checklist.filter(i => i.done).length;
    const total = card.checklist.length;
    const sum = document.createElement('div');
    sum.className = 'card-checklist-summary';
    sum.innerHTML = `<span>☑ ${done}/${total}</span><div class="checklist-mini-bar"><div class="checklist-mini-fill" style="width:${Math.round(done/total*100)}%"></div></div>`;
    el.appendChild(sum);
  }

  setupCardDrag(el, card.id, colId);
  el.addEventListener('click', e => {
    if (e.target.closest('.card-action-btn') || e.target.closest('.card-emoji') || e.target.closest('.card-title')) return;
    openModal(card.id, colId);
  });
  return el;
}

/* ============================================================
   DRAG & DROP
   ============================================================ */
let touchClone = null, touchDragEl = null;

function setupCardDrag(el, cardId, colId) {
  el.addEventListener('dragstart', e => {
    dragInfo = { cardId, fromColId: colId };
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => el.style.opacity = '0.4', 0);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    el.style.opacity = '';
    document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
    document.querySelectorAll('.cards-list.drag-over-list').forEach(c => c.classList.remove('drag-over-list'));
  });

  el.addEventListener('touchstart', e => {
    const touch = e.touches[0];
    touchDragEl = el;
    dragInfo = { cardId, fromColId: colId };
    touchClone = el.cloneNode(true);
    touchClone.style.cssText = `position:fixed;z-index:9999;width:${el.offsetWidth}px;opacity:0.85;pointer-events:none;border-radius:10px;`;
    touchClone.style.left = (touch.clientX - el.offsetWidth/2) + 'px';
    touchClone.style.top  = (touch.clientY - 20) + 'px';
    document.body.appendChild(touchClone);
    el.style.opacity = '0.4';
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!touchClone) return;
    e.preventDefault();
    const touch = e.touches[0];
    touchClone.style.left = (touch.clientX - touchClone.offsetWidth/2) + 'px';
    touchClone.style.top  = (touch.clientY - 20) + 'px';
    touchClone.style.display = 'none';
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    touchClone.style.display = '';
    document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
    const col = target?.closest('.column');
    if (col) col.classList.add('drag-over');
  }, { passive: false });

  el.addEventListener('touchend', e => {
    if (!touchClone) return;
    const touch = e.changedTouches[0];
    touchClone.remove(); touchClone = null;
    if (touchDragEl) touchDragEl.style.opacity = '';
    touchDragEl = null;
    const target = document.elementFromPoint(touch.clientX, touch.clientY);
    const list = target?.closest('.cards-list');
    const col  = target?.closest('.column');
    const toColId = list?.dataset.colId || col?.dataset.colId;
    if (toColId) dropCard(toColId, target);
    document.querySelectorAll('.column.drag-over').forEach(c => c.classList.remove('drag-over'));
  });
}

function setupDropZone(list, colId) {
  list.addEventListener('dragover', e => {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    list.classList.add('drag-over-list');
    list.closest('.column')?.classList.add('drag-over');
  });
  list.addEventListener('dragleave', e => {
    if (!list.contains(e.relatedTarget)) {
      list.classList.remove('drag-over-list');
      list.closest('.column')?.classList.remove('drag-over');
    }
  });
  list.addEventListener('drop', e => {
    e.preventDefault();
    list.classList.remove('drag-over-list');
    list.closest('.column')?.classList.remove('drag-over');
    dropCard(colId, e.target);
  });
}

function dropCard(toColId, targetEl) {
  const { cardId, fromColId } = dragInfo;
  if (!cardId || !fromColId) return;
  const fromCol = getCol(fromColId), toCol = getCol(toColId);
  if (!fromCol || !toCol) return;
  const cardIdx = fromCol.cards.findIndex(c => c.id === cardId);
  if (cardIdx === -1) return;
  const [card] = fromCol.cards.splice(cardIdx, 1);
  let insertIdx = toCol.cards.length;
  const targetCard = targetEl?.closest('.card');
  if (targetCard && toColId === targetCard.dataset.colId) {
    const idx = toCol.cards.findIndex(c => c.id === targetCard.dataset.cardId);
    if (idx !== -1) insertIdx = idx;
  }
  toCol.cards.splice(insertIdx, 0, card);
  dragInfo = { cardId: null, fromColId: null };
  saveState(); renderBoard();
}

/* ============================================================
   CARD CRUD
   ============================================================ */
function addCard(colId) {
  const col = getCol(colId);
  const card = defaultCard('Novo card');
  col.cards.push(card);
  saveState(); renderBoard();
  setTimeout(() => {
    const el = document.querySelector(`.card[data-card-id="${card.id}"] .card-title`);
    if (el) { el.focus(); document.execCommand('selectAll', false, null); }
  }, 50);
}

function deleteCard(cardId, colId) {
  const col = getCol(colId);
  const idx = col.cards.findIndex(c => c.id === cardId);
  if (idx === -1) return;
  const [removed] = col.cards.splice(idx, 1);
  undoStack.push({ type: 'delete_card', colId, idx, card: JSON.parse(JSON.stringify(removed)) });
  if (undoStack.length > 20) undoStack.shift();
  saveState(); renderBoard(); toast('Card excluído');
}

function undoAction() {
  const action = undoStack.pop();
  if (!action) { toast('Nada para desfazer'); return; }
  if (action.type === 'delete_card') {
    const col = getCol(action.colId);
    if (col) { col.cards.splice(action.idx, 0, action.card); saveState(); renderBoard(); toast('Desfeito'); }
  }
}

/* ============================================================
   MODAL
   ============================================================ */
function openModal(cardId, colId) {
  const { card } = getCard(cardId) || {};
  if (!card) return;
  currentModalCardId = cardId;
  currentModalColId  = colId;

  document.getElementById('modal-emoji-btn').textContent = card.emoji || '📌';
  document.getElementById('modal-title-input').value = card.title;
  document.getElementById('modal-desc').value = card.description || '';
  document.getElementById('modal-date').value = card.dueDate || '';
  document.getElementById('note-editor').value = card.note || '';

  buildColorPalette(card.color);
  buildPrioritySelector(card.priority || 'none');
  renderModalTags(card.tags || []);
  renderModalChecklist(card.checklist || []);

  // reset to details tab
  switchModalTab('details');
  // reset note to edit mode
  notePreviewMode = false;
  updateNoteView();

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  if (currentModalCardId) {
    const { card } = getCard(currentModalCardId) || {};
    if (card) {
      card.title       = document.getElementById('modal-title-input').value.trim() || card.title;
      card.description = document.getElementById('modal-desc').value;
      card.dueDate     = document.getElementById('modal-date').value;
      card.note        = document.getElementById('note-editor').value;
    }
  }
  document.getElementById('modal-overlay').classList.remove('open');
  currentModalCardId = null; currentModalColId = null;
  saveState(); renderBoard();
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('modal-title-input').addEventListener('input', () => {
  if (!currentModalCardId) return;
  const { card } = getCard(currentModalCardId) || {};
  if (card) card.title = document.getElementById('modal-title-input').value;
});

// Modal tabs
document.querySelectorAll('.modal-tab').forEach(tab => {
  tab.addEventListener('click', () => switchModalTab(tab.dataset.tab));
});
function switchModalTab(name) {
  document.querySelectorAll('.modal-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.getElementById('panel-details').classList.toggle('active', name === 'details');
  document.getElementById('panel-note').classList.toggle('active', name === 'note');
}

// Note editor
document.getElementById('note-editor').addEventListener('input', () => {
  if (!currentModalCardId) return;
  const { card } = getCard(currentModalCardId) || {};
  if (card) card.note = document.getElementById('note-editor').value;
});

document.getElementById('note-edit-btn').addEventListener('click', () => {
  notePreviewMode = false; updateNoteView();
});
document.getElementById('note-preview-btn').addEventListener('click', () => {
  notePreviewMode = true; updateNoteView();
});

function updateNoteView() {
  const editor = document.getElementById('note-editor');
  const preview = document.getElementById('note-preview');
  const editBtn = document.getElementById('note-edit-btn');
  const prevBtn = document.getElementById('note-preview-btn');
  if (notePreviewMode) {
    editor.style.display = 'none';
    preview.style.display = 'block';
    preview.innerHTML = renderMarkdown(editor.value);
    editBtn.classList.remove('active'); prevBtn.classList.add('active');
  } else {
    editor.style.display = 'block';
    preview.style.display = 'none';
    editBtn.classList.add('active'); prevBtn.classList.remove('active');
  }
}

function renderMarkdown(text) {
  if (!text) return '<p style="color:var(--text3);font-style:italic">Nota vazia. Escreva em Markdown na aba de edição.</p>';
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/^---$/gm, '<hr>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^- \[x\] (.+)$/gm, '<li style="list-style:none">✅ $1</li>')
    .replace(/^- \[ \] (.+)$/gm, '<li style="list-style:none">⬜ $1</li>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    .replace(/\[\[([^\]]+)\]\]/g, '<a href="#">[[<span style="color:var(--accent)">$1</span>]]</a>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return '<p>' + html + '</p>';
}

/* ============================================================
   COLOR PALETTE (card)
   ============================================================ */
function buildColorPalette(selected) {
  const palette = document.getElementById('color-palette');
  palette.innerHTML = '';
  CARD_COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (!c ? ' none-swatch' : '');
    if (c) sw.style.background = c; else sw.textContent = '✕';
    if (c === selected || (!c && !selected)) sw.classList.add('selected');
    sw.addEventListener('click', () => {
      palette.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      const { card } = getCard(currentModalCardId) || {};
      if (card) { card.color = c; saveState(); }
    });
    palette.appendChild(sw);
  });
}

/* ============================================================
   COLUMN COLOR PICKER
   ============================================================ */
function openColColorPicker(colId, x, y) {
  colColorTargetId = colId;
  const picker = document.getElementById('col-color-picker');
  const grid   = document.getElementById('col-palette-grid');
  grid.innerHTML = '';
  const col = getCol(colId);
  COL_COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'c-swatch' + (c === col?.color ? ' sel' : '');
    sw.style.background = c;
    sw.addEventListener('click', (e) => {
      e.stopPropagation(); // Impede fechamento imediato do evento click
      const targetCol = getCol(colColorTargetId);
      if (targetCol) {
        targetCol.color = c;
        saveState(); renderBoard();
      }
      closeColColorPicker();
    });
    grid.appendChild(sw);
  });
  picker.classList.add('open');
  const pw = 180, ph = 140;
  picker.style.left = Math.min(x, window.innerWidth - pw - 8) + 'px';
  picker.style.top  = Math.min(y + 8, window.innerHeight - ph - 8) + 'px';
}
function closeColColorPicker() {
  document.getElementById('col-color-picker').classList.remove('open');
  colColorTargetId = null;
}

/* ============================================================
   PRIORITY SELECTOR
   ============================================================ */
function buildPrioritySelector(selected) {
  document.querySelectorAll('.priority-btn').forEach(btn => {
    btn.className = 'priority-btn';
    if (btn.dataset.p === selected) btn.classList.add('selected-' + selected);
  });
}
document.querySelectorAll('.priority-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = btn.dataset.p;
    buildPrioritySelector(p);
    const { card } = getCard(currentModalCardId) || {};
    if (card) { card.priority = p; saveState(); }
  });
});

/* ============================================================
   TAGS
   ============================================================ */
function renderModalTags(tags) {
  const wrap = document.getElementById('tags-wrap');
  wrap.querySelectorAll('.tag-chip').forEach(t => t.remove());
  tags.forEach(tag => addTagChip(tag, wrap));
}
function addTagChip(tag, wrap) {
  const idx = tag.split('').reduce((a,c)=>a+c.charCodeAt(0),0) % TAG_COLORS.length;
  const tc = TAG_COLORS[idx];
  const chip = document.createElement('span');
  chip.className = 'tag-chip';
  chip.style.background = tc.bg; chip.style.color = tc.fg;
  chip.innerHTML = `#${tag} <button title="Remover">✕</button>`;
  chip.querySelector('button').addEventListener('click', () => {
    chip.remove();
    const { card } = getCard(currentModalCardId) || {};
    if (card) { card.tags = card.tags.filter(t => t !== tag); saveState(); }
  });
  wrap.insertBefore(chip, document.getElementById('modal-tag-input'));
}
document.getElementById('modal-tag-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/^#/, '');
    if (!val) return;
    const { card } = getCard(currentModalCardId) || {};
    if (card && !card.tags.includes(val)) {
      card.tags.push(val);
      addTagChip(val, document.getElementById('tags-wrap'));
      saveState();
    }
    e.target.value = '';
  }
});

/* ============================================================
   CHECKLIST
   ============================================================ */
function renderModalChecklist(items) {
  const cont = document.getElementById('modal-checklist');
  cont.innerHTML = '';
  items.forEach(item => addChecklistRow(item));
}
function addChecklistRow(item) {
  const cont = document.getElementById('modal-checklist');
  const row = document.createElement('div');
  row.className = 'checklist-item';
  row.innerHTML = `
    <input type="checkbox" ${item.done ? 'checked' : ''}>
    <div class="checklist-item-text${item.done ? ' done' : ''}" contenteditable="true">${item.text}</div>
    <button class="checklist-del" title="Remover">✕</button>
  `;
  const cb = row.querySelector('input[type="checkbox"]');
  const txt = row.querySelector('.checklist-item-text');
  cb.addEventListener('change', () => { item.done = cb.checked; txt.classList.toggle('done', cb.checked); saveState(); });
  txt.addEventListener('blur', () => { item.text = txt.textContent.trim(); saveState(); });
  row.querySelector('.checklist-del').addEventListener('click', () => {
    const { card } = getCard(currentModalCardId) || {};
    if (card) { card.checklist = card.checklist.filter(i => i !== item); row.remove(); saveState(); }
  });
  cont.appendChild(row);
}
document.getElementById('add-checklist-item').addEventListener('click', () => {
  const { card } = getCard(currentModalCardId) || {};
  if (!card) return;
  const item = { id: uid(), text: 'Novo item', done: false };
  card.checklist.push(item);
  addChecklistRow(item);
  saveState();
  setTimeout(() => {
    const rows = document.querySelectorAll('.checklist-item-text');
    const last = rows[rows.length - 1];
    if (last) { last.focus(); document.execCommand('selectAll', false, null); }
  }, 50);
});

document.getElementById('modal-emoji-btn').addEventListener('click', e => {
  e.stopPropagation();
  const r = e.target.getBoundingClientRect();
  openEmojiPicker('modal', r.left, r.bottom + 4);
});

/* ============================================================
   EMOJI PICKER
   ============================================================ */
(function buildEmojiPicker() {
  const cats = document.getElementById('emoji-cats');
  const grid = document.getElementById('emoji-grid');
  const keys = Object.keys(EMOJIS);
  function showCat(cat) {
    cats.querySelectorAll('.emoji-cat-btn').forEach(b => b.classList.toggle('active', b.textContent === cat));
    grid.innerHTML = '';
    EMOJIS[cat].forEach(em => {
      const btn = document.createElement('button');
      btn.className = 'emoji-btn';
      btn.textContent = em;
      btn.addEventListener('click', () => {
        if (emojiPickerTarget === 'modal') {
          document.getElementById('modal-emoji-btn').textContent = em;
          const { card } = getCard(currentModalCardId) || {};
          if (card) { card.emoji = em; saveState(); }
        } else {
          const res = getCard(emojiPickerTarget);
          if (res) { res.card.emoji = em; saveState(); renderBoard(); }
        }
        closeEmojiPicker();
      });
      grid.appendChild(btn);
    });
  }
  keys.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'emoji-cat-btn';
    btn.textContent = cat;
    btn.addEventListener('click', () => showCat(cat));
    cats.appendChild(btn);
  });
  showCat(keys[0]);
})();

function openEmojiPicker(target, x, y) {
  emojiPickerTarget = target;
  const picker = document.getElementById('emoji-picker');
  picker.classList.add('open');
  const pw = 270, ph = 240;
  picker.style.left = Math.min(x, window.innerWidth - pw - 8) + 'px';
  picker.style.top  = Math.min(y, window.innerHeight - ph - 8) + 'px';
}
function closeEmojiPicker() {
  document.getElementById('emoji-picker').classList.remove('open');
  emojiPickerTarget = null;
}

/* ============================================================
   CONTEXT MENU (column)
   ============================================================ */
function openCtxMenu(colId, x, y) {
  ctxColId = colId;
  const menu = document.getElementById('ctx-menu');
  menu.classList.add('open');
  menu.style.left = Math.min(x, window.innerWidth - 180) + 'px';
  menu.style.top  = Math.min(y, window.innerHeight - 130) + 'px';
}
function closeCtxMenu() {
  document.getElementById('ctx-menu').classList.remove('open');
  ctxColId = null;
}

document.getElementById('ctx-rename').addEventListener('click', (e) => {
  e.stopPropagation();
  const id = ctxColId; closeCtxMenu();
  let found = null;
  document.querySelectorAll('.column').forEach(col => {
    if (col.dataset.colId === id) found = col.querySelector('.col-title');
  });
  if (found) { found.focus(); document.execCommand('selectAll', false, null); }
});

document.getElementById('ctx-color').addEventListener('click', (e) => {
  e.stopPropagation(); // FIX: Impede fechamento imediato do seletor de cor pelo click global
  const id = ctxColId; closeCtxMenu();
  const col = document.querySelector(`.column[data-col-id="${id}"]`);
  if (col) {
    const dot = col.querySelector('.col-dot');
    const r = dot.getBoundingClientRect();
    openColColorPicker(id, r.left, r.bottom);
  }
});

document.getElementById('ctx-delete').addEventListener('click', (e) => {
  e.stopPropagation();
  const id = ctxColId; closeCtxMenu();
  const p = activeProject();
  if (p.columns.length <= 1) { toast('Não é possível excluir a única coluna.'); return; }
  const col = p.columns.find(c => c.id === id);
  confirm2(`Excluir "${col?.name}"?`, 'Todos os cards desta coluna serão perdidos.', () => {
    p.columns = p.columns.filter(c => c.id !== id);
    saveState(); renderBoard();
  });
});

/* ============================================================
   SEARCH
   ============================================================ */
document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  applySearch();
});
function applySearch() {
  const q = searchQuery;
  document.querySelectorAll('.card').forEach(el => {
    if (!q) { el.style.display = ''; return; }
    const card = getCard(el.dataset.cardId)?.card;
    if (!card) return;
    const match = card.title.toLowerCase().includes(q) ||
      (card.description || '').toLowerCase().includes(q) ||
      (card.note || '').toLowerCase().includes(q) ||
      (card.tags || []).some(t => t.toLowerCase().includes(q));
    el.style.display = match ? '' : 'none';
  });
}

/* ============================================================
   EXPORT
   ============================================================ */
document.getElementById('export-btn').addEventListener('click', e => {
  e.stopPropagation();
  const dd = document.getElementById('export-dropdown');
  dd.classList.toggle('open');
});

document.getElementById('exp-json').addEventListener('click', () => {
  document.getElementById('export-dropdown').classList.remove('open');
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `kanban-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); URL.revokeObjectURL(url);
  toast('JSON exportado');
});

document.getElementById('exp-md').addEventListener('click', () => {
  document.getElementById('export-dropdown').classList.remove('open');
  const p = activeProject();
  if (!p) return;
  const md = buildMarkdownExport([p]);
  downloadText(md, `${slugify(p.name)}.md`);
  toast('Markdown exportado para Obsidian');
});

document.getElementById('exp-md-all').addEventListener('click', () => {
  document.getElementById('export-dropdown').classList.remove('open');
  const md = buildMarkdownExport(state.projects);
  downloadText(md, `kanban-todos-projetos.md`);
  toast('Todos os projetos exportados em Markdown');
});

function slugify(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

function downloadText(content, filename) {
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click(); URL.revokeObjectURL(url);
}

function buildMarkdownExport(projects) {
  const now = new Date().toISOString().slice(0,10);
  let md = '';
  projects.forEach(p => {
    md += `---\n`;
    md += `kanban: "${p.name}"\n`;
    md += `exportado: ${now}\n`;
    md += `tags: [kanban]\n`;
    md += `---\n\n`;
    md += `# ${p.name}\n\n`;

    p.columns.forEach(col => {
      md += `## ${col.name} (${col.cards.length})\n\n`;
      if (col.cards.length === 0) {
        md += `_Sem cards_\n\n`;
      } else {
        col.cards.forEach(card => {
          const pIcon = card.priority === 'high' ? '🔴' : card.priority === 'medium' ? '🟡' : card.priority === 'low' ? '🟢' : '';
          md += `### ${card.emoji || '📌'} ${card.title}${pIcon ? ' ' + pIcon : ''}\n\n`;
          if (card.description) md += `${card.description}\n\n`;
          if (card.dueDate) md += `📅 **Vencimento:** ${card.dueDate}\n\n`;
          if (card.tags && card.tags.length > 0)
            md += `🏷 ${card.tags.map(t => `#${t}`).join(' ')}\n\n`;
          if (card.checklist && card.checklist.length > 0) {
            md += `**Checklist:**\n`;
            card.checklist.forEach(item => {
              md += `- [${item.done ? 'x' : ' '}] ${item.text}\n`;
            });
            md += '\n';
          }
          if (card.note && card.note.trim()) {
            md += `**Nota:**\n\n`;
            md += card.note.split('\n').map(l => l).join('\n');
            md += '\n\n';
          }
          md += `---\n\n`;
        });
      }
    });
    md += '\n';
  });
  return md;
}

/* ============================================================
   IMPORT
   ============================================================ */
document.getElementById('import-btn').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!data.projects) throw new Error();
      confirm2('Importar JSON?', 'Os dados atuais serão substituídos.', () => {
        state = data;
        if (!state.activeProjectId) state.activeProjectId = state.projects[0]?.id;
        saveState(); renderProjectDropdown(); renderBoard();
        toast('Importado com sucesso');
      });
    } catch(err) { toast('Arquivo JSON inválido'); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ============================================================
   UNDO & KEYBOARD
   ============================================================ */
document.getElementById('undo-btn').addEventListener('click', undoAction);
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoAction(); }
  if (e.key === 'Escape') {
    closeModal(); closeEmojiPicker(); closeCtxMenu(); closeColColorPicker();
    closeProjectDropdown();
    document.getElementById('confirm-overlay').classList.remove('open');
    document.getElementById('export-dropdown').classList.remove('open');
  }
  if ((e.key === 'n' || e.key === 'N') && !document.activeElement.closest('#modal-overlay')) {
    const el = document.activeElement;
    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.isContentEditable) return;
    const p = activeProject();
    if (p && p.columns.length > 0) addCard(p.columns[0].id);
  }
});

/* ============================================================
   CLOSE OVERLAYS ON OUTSIDE CLICK
   ============================================================ */
document.addEventListener('click', e => {
  if (!e.target.closest('#emoji-picker') && !e.target.closest('.card-emoji') && !e.target.closest('#modal-emoji-btn'))
    closeEmojiPicker();
  if (!e.target.closest('#ctx-menu') && !e.target.closest('.col-menu-btn'))
    closeCtxMenu();
  if (!e.target.closest('#col-color-picker') && !e.target.closest('.col-dot'))
    closeColColorPicker();
  if (!e.target.closest('#project-dropdown') && !e.target.closest('#project-trigger'))
    closeProjectDropdown();
  if (!e.target.closest('#export-dropdown') && !e.target.closest('#export-btn'))
    document.getElementById('export-dropdown').classList.remove('open');
});

/* ============================================================
   CONFIRM
   ============================================================ */
let confirmCallback = null;
function confirm2(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  confirmCallback = cb;
  document.getElementById('confirm-overlay').classList.add('open');
}
document.getElementById('confirm-ok').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.remove('open');
  if (confirmCallback) { confirmCallback(); confirmCallback = null; }
});
document.getElementById('confirm-cancel').addEventListener('click', () => {
  document.getElementById('confirm-overlay').classList.remove('open');
  confirmCallback = null;
});

/* ============================================================
   TOAST
   ============================================================ */
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

/* ============================================================
   INIT
   ============================================================ */
initTheme();
loadState();
renderProjectDropdown();
renderBoard();
</script>
</body>
</html>
